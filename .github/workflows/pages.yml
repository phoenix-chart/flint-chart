name: Deploy demos to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Build gallery
        run: |
          npm --prefix examples/gallery install
          npm --prefix examples/gallery run build
        env:
          VITE_BASE_PATH: /flint-chart/gallery/
      - name: Build editor
        run: |
          npm --prefix examples/editor install
          npm --prefix examples/editor run build
        env:
          VITE_BASE_PATH: /flint-chart/editor/
      - name: Compose site
        run: |
          mkdir -p _site/gallery _site/editor
          cp -R examples/gallery/dist/* _site/gallery/
          cp -R examples/editor/dist/* _site/editor/
          cp docs/landing.html _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
