[project]
name = "flint-chart"
version = "0.1.0"
description = "Python port of the Flint semantic chart compiler — Vega-Lite backend"
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["python-dateutil>=2.8"]
license = {text = "MIT"}
authors = [{ name = "Microsoft Corporation" }]
keywords = [
    "visualization",
    "charts",
    "vega-lite",
    "semantic-types",
    "llm",
    "agent",
    "data-visualization",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Visualization",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/microsoft/flint-chart"
Repository = "https://github.com/microsoft/flint-chart"

[project.optional-dependencies]
test = ["pytest>=7"]
dev = ["pytest>=7", "ruff>=0.4"]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["flint*"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py310"
line-length = 120
