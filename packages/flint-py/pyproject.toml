[project]
name = "flint"
version = "0.1.0"
description = "Python port of the Flint semantic chart compiler — Vega-Lite backend"
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["python-dateutil>=2.8"]
license = "MIT"

[project.urls]
Homepage = "https://github.com/microsoft/flint-chart"
Repository = "https://github.com/microsoft/flint-chart"

[project.optional-dependencies]
test = ["pytest>=7"]
dev = ["pytest>=7", "ruff>=0.4"]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["flint*"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py310"
line-length = 120
