<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flint: A Visualization Library for AI Agents and Humans</title>
    <link rel="icon" href="data:," />
    <style>
      html, body, #root { margin: 0; padding: 0; height: 100%; }
      body { font: 14px/1.5 Arial, Roboto, 'Helvetica Neue', sans-serif; color: #1f2328; background: #ffffff; }
      a { color: #0969da; }

      /* Thin, flat, low-contrast scrollbars (sidebars, panels, page). */
      * { scrollbar-width: thin; scrollbar-color: rgba(0, 0, 0, 0.16) transparent; }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.16);
        border-radius: 8px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 0, 0, 0.28);
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-corner { background: transparent; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
