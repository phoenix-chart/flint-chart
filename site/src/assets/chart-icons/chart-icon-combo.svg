<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Combo chart: bars (left axis) overlaid with a trend line (right axis) -->
  <!-- Y-axis -->
  <line x1="48" y1="28" x2="48" y2="220" stroke="#363636" stroke-width="4" stroke-linecap="round"/>
  <!-- X-axis -->
  <line x1="44" y1="216" x2="240" y2="216" stroke="#363636" stroke-width="4" stroke-linecap="round"/>
  <!-- Bars -->
  <rect x="70"  y="140" width="30" height="74"  fill="#76c6ff" stroke="#363636" stroke-width="2"/>
  <rect x="112" y="112" width="30" height="102" fill="#76c6ff" stroke="#363636" stroke-width="2"/>
  <rect x="154" y="130" width="30" height="84"  fill="#76c6ff" stroke="#363636" stroke-width="2"/>
  <rect x="196" y="92"  width="30" height="122" fill="#76c6ff" stroke="#363636" stroke-width="2"/>
  <!-- Trend line -->
  <polyline points="85,118 127,78 169,104 211,62" fill="none" stroke="#3aa6ee" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="85"  cy="118" r="7" fill="#3aa6ee" stroke="#363636" stroke-width="2"/>
  <circle cx="127" cy="78"  r="7" fill="#3aa6ee" stroke="#363636" stroke-width="2"/>
  <circle cx="169" cy="104" r="7" fill="#3aa6ee" stroke="#363636" stroke-width="2"/>
  <circle cx="211" cy="62"  r="7" fill="#3aa6ee" stroke="#363636" stroke-width="2"/>
</svg>
